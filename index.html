<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navin Secondary School</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <h2>Navin Secondary School</h2>
  <nav class="menu">
    <a href="#">Home</a>
    <a href="#news">News</a>
    <a href="#results">Results</a>
    <a href="#admission">Admission</a>
    <button onclick="showLogin()">Admin</button>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to Navin Secondary School</h1>
</section>

<!-- NEWS -->
<section id="news" class="section">
  <h2>School News</h2>

  <div id="newsContainer" class="grid"></div>

  <div id="adminPanel" class="admin-panel">
    <h3>Add News</h3>
    <input id="title" placeholder="Title">
    <input type="file" id="imageFile">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="addNews()">Add News</button>
  </div>
</section>

<!-- RESULTS -->
<section id="results" class="section">
  <h2>Student Result</h2>

  <input id="searchRoll" placeholder="Enter Roll No">
  <button onclick="searchResult()">Search</button>

  <div id="resultBox"></div>

  <h3>All Students</h3>
  <table id="resultTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Total</th>
        <th>%</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="resultAdmin" class="admin-panel">
    <h3>Add Result</h3>
    <input id="rname" placeholder="Name">
    <input id="roll" placeholder="Roll No">
    <input id="math" placeholder="Math">
    <input id="science" placeholder="Science">
    <input id="english" placeholder="English">
    <button onclick="addResult()">Save Result</button>
  </div>
</section>

<!-- ADMISSION -->
<section id="admission" class="section">
  <h2>Admission</h2>
  <input placeholder="Name"><br><br>
  <input placeholder="Email"><br><br>
  <button>Apply</button>
</section>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h3>Admin Login</h3>
  <input type="password" id="pass">
  <button onclick="login()">Login</button>
</div>

<script src="script.js"></script>
</body>
</html>
